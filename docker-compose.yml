version: '3.8'

services:
  family-display:
    build: .
    container_name: family-display
    ports:
      - "8080:8080"
    volumes:
      # Mount data directory so content can be updated from outside
      - ./data:/app/data
      # Mount static files so frontend changes don't require a rebuild
      - ./static:/app/static
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
