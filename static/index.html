<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header with date/time/weather/forecast -->
        <header class="header">
            <div class="date-time">
                <div class="date" id="current-date">Loading...</div>
                <div class="time" id="current-time">--:--</div>
            </div>
            <div class="weather" id="weather">
                <span class="temp">--°</span>
                <span class="condition">--</span>
            </div>
            <div id="forecast" class="forecast-inline"></div>
        </header>

        <!-- Main content: 2-column grid -->
        <main class="main-content">
            <!-- Left: Today's Schedule -->
            <section class="card schedule-card">
                <h2>Today</h2>
                <div id="today-schedule" class="schedule-list">
                    <p class="loading">Loading schedule...</p>
                </div>
                <div id="lunch-menu" class="menu-list" style="margin-top: 12px;">
                    <p class="loading">Loading lunch...</p>
                </div>
            </section>

            <!-- Right: Reminders -->
            <section class="card reminders-card">
                <h2>Reminders</h2>
                <div id="reminders" class="reminder-list">
                    <p class="loading">Loading reminders...</p>
                </div>
            </section>

            <!-- Full-width: Week Calendar -->
            <section class="card week-card">
                <h2>This Week</h2>
                <div id="upcoming" class="week-grid">
                    <p class="loading">Loading week...</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            Last updated: <span id="last-update">--</span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
